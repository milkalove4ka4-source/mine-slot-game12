<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mine Slot Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Arial Black', sans-serif;
            color: white;
            user-select: none;
        }
        #ui-container {
            width: 400px;
            display: flex;
            justify-content: space-between;
            background: #222;
            padding: 10px;
            border: 3px solid #444;
            border-bottom: none;
            box-sizing: border-box;
        }
        #game-div {
            border: 3px solid #444;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
        .controls {
            width: 400px;
            background: #222;
            border: 3px solid #444;
            border-top: none;
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .bet-row {
            display: flex;
            justify-content: space-between;
            gap: 5px;
        }
        button {
            background: #555;
            color: white;
            border: 2px solid #777;
            padding: 8px;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
        }
        button:hover { background: #666; }
        #spin-btn {
            background: #00aa00;
            border: 2px solid #00ff00;
            padding: 12px;
            font-size: 18px;
        }
        #spin-btn:hover { background: #00cc00; }
        #spin-btn:disabled { background: #333; border-color: #555; cursor: not-allowed; }
        .yellow { color: #ffff55; }
        .green { color: #55ff55; }
    </style>
</head>
<body>

    <div id="ui-container">
        <div>БАЛАНС: <span id="balance-txt" class="green">$100,000</span></div>
        <div>СТАВКА: <span id="bet-txt" class="yellow">200</span></div>
    </div>

    <div id="game-div"></div>

    <div class="controls">
        <div class="bet-row">
            <button onclick="changeBet('min')">МИН</button>
            <button onclick="changeBet(10)">+10</button>
            <button onclick="changeBet(100)">+100</button>
            <button onclick="changeBet('max')">МАКС</button>
        </div>
        <button id="spin-btn" onclick="pressSpin()">ИГРАТЬ (ПАДЕНИЕ КИРОК)</button>
    </div>

<script>
    let balance = 100000;
    let bet = 200;
    let isPlaying = false;
    let phaserGame;

    // Конфигурация Phaser 3
    const config = {
        type: Phaser.AUTO,
        width: 400,
        height: 500,
        parent: 'game-div',
        backgroundColor: '#2d1d13',
        physics: {
            default: 'arcade',
            arcade: { debug: false }
        },
        scene: {
            preload: preload,
            create: create,
            update: update
        }
    };

    phaserGame = new Phaser.Game(config);
    let sceneRef;
    let blocksGroup;
    let pickaxesGroup;

    function preload() {
        sceneRef = this;
        // Генерируем текстуры «на лету», чтобы тебе не надо было скачивать картинки
        createPixelTexture(this, 'dirt', '#866043');
        createPixelTexture(this, 'stone', '#737373');
        createPixelTexture(this, 'gold', '#fdb813');
        createPixelTexture(this, 'diamond', '#4dedf4');
        createPixelTexture(this, 'pickaxe', '#ffffff', true); // Текстура кирки
    }

    function create() {
        blocksGroup = this.physics.add.staticGroup();
        pickaxesGroup = this.physics.add.group();

        // Отрисовка сетки блоков (5 столбцов, 6 строк)
        generateGrid();

        // Настройка столкновений: когда кирка касается блока
        this.physics.add.overlap(pickaxesGroup, blocksGroup, hitBlock, null, this);
    }

    function update() {
        // Если кирка улетела за нижний экран — уничтожаем её
        pickaxesGroup.children.iterate((pick) => {
            if (pick && pick.y > 550) {
                pick.destroy();
            }
        });

        // Проверка окончания раунда
        if (isPlaying && pickaxesGroup.countActive() === 0) {
            endRound();
        }
    }

    // Функция создания цветных пиксельных квадратов вместо картинок
    function createPixelTexture(scene, key, color, isPickaxe = false) {
        let graphics = scene.make.graphics({ x: 0, y: 0, add: false });
        graphics.fillStyle(Phaser.Display.Color.HexStringToColor(color).color, 1);
        
        if (isPickaxe) {
            // Рисуем подобие кирки (Т-образная форма)
            graphics.fillRect(10, 0, 20, 8);
            graphics.fillRect(18, 8, 4, 24);
        } else {
            // Обычный блок руды с рамкой
            graphics.fillRect(2, 2, 60, 60);
            graphics.lineStyle(2, 0x000000, 0.5);
            graphics.strokeRect(0, 0, 64, 64);
        }
        
        graphics.generateTexture(key, 64, 64);
    }

    function generateGrid() {
        blocksGroup.clear(true, true);
        const types = ['dirt', 'dirt', 'stone', 'stone', 'gold', 'diamond'];
        
        for (let r = 0; r < 6; r++) {
            for (let c = 0; c < 5; c++) {
                // Чем ниже строка, тем круче руда
                let type = types[Math.floor(Math.random() * (r + 1 > 6 ? 6 : r + 1))];
                if (!type) type = 'dirt';
                
                let x = c * 76 + 48;
                let y = r * 68 + 120;
                
                let block = blocksGroup.create(x, y, type);
                block.setData('type', type);
                block.refreshBody();
            }
        }
    }

    // Логика удара кирки о блок
    function hitBlock(pickaxe, block) {
        let type = block.getData('type');
        let winMultiplier = 0;

        // Начисление за разные типы руды
        if (type === 'dirt') winMultiplier = 0.1;
        else if (type === 'stone') winMultiplier = 0.5;
        else if (type === 'gold') winMultiplier = 2;
        else if (type === 'diamond') winMultiplier = 10;

        let winAmount = Math.floor(bet * winMultiplier);
        if (winAmount > 0) {
            balance += winAmount;
            document.getElementById('balance-txt').innerText = `$${balance.toLocaleString()}`;
        }

        // Создаем быстрый эффект «взрыва» блока и удаляем его
        let x = block.x;
        let y = block.y;
        block.destroy();

        // Кирка немного замедляется при ударе, имитируя сопротивление
        pickaxe.setVelocityY(pickaxe.body.velocity.y * 0.85);
    }

    // Нажатие на кнопку Спина
    function pressSpin() {
        if (isPlaying || balance < bet) return;

        isPlaying = true;
        document.getElementById('spin-btn').disabled = true;

        balance -= bet;
        document.getElementById('balance-txt').innerText = `$${balance.toLocaleString()}`;

        // Пересобираем шахту
        generateGrid();

        // Сбрасываем кирки сверху экрана с разной скоростью падения
        for (let c = 0; c < 5; c++) {
            let x = c * 76 + 48;
            let y = -50 - (Math.random() * 100); // Разная высота старта для эффекта очереди
            
            let pick = pickaxesGroup.create(x, y, 'pickaxe');
            pick.setOrigin(0.5);
            // Физика падения гравитации вниз
            pick.setVelocityY(300 + Math.random() * 150); 
            pick.setGravityY(400); 
        }
    }

    function endRound() {
        isPlaying = false;
        document.getElementById('spin-btn').disabled = false;
    }

    // Функции интерфейса для ставок
    function changeBet(type) {
        if (isPlaying) return;
        if (type === 'min') bet = 10;
        else if (type === 'max') bet = balance;
        else bet += type;

        if (bet < 10) bet = 10;
        if (bet > balance) bet = balance;

        document.getElementById('bet-txt').innerText = bet.toLocaleString();
    }
</script>

</body>
</html>
